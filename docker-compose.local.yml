# ============================================================================
# Mnemo Local Source Override
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
#
# This keeps Redis and Qdrant from the root compose file, but rebuilds the
# Mnemo server image from your local checkout so source edits are reflected.
# ============================================================================

services:
  mnemo:
    build:
      context: .
      dockerfile: Dockerfile
