# ============================================================================
# Mnemo Configuration
# Memory that evolves. Context that matters.
# ============================================================================

[server]
host = "0.0.0.0"
port = 8080
# Number of worker threads. 0 = number of CPU cores.
workers = 0

[auth]
enabled = false
# API keys for authentication. Set via MNEMO_AUTH_API_KEYS env var in production.
api_keys = []

[redis]
url = "redis://localhost:6379"
# Key prefix for multi-service Redis instances.
prefix = "mnemo:"
max_connections = 50

[qdrant]
url = "http://localhost:6334"
# Collection name prefix.
collection_prefix = "mnemo_"

[llm]
# Provider for entity/relationship extraction.
# Options: "anthropic" (recommended online), "openai", "liquid" (recommended offline), "ollama", "none"
provider = "anthropic"
# Set via MNEMO_LLM_API_KEY env var in production.
api_key = ""
# Model for extraction tasks.
# Anthropic: "claude-sonnet-4-20250514" (recommended)
# OpenAI: "gpt-4o-mini"
# Liquid: "lfm-3b" or "lfm-7b" (for offline/local)
# Ollama: any model name available on your Ollama instance
model = "claude-sonnet-4-20250514"
# Base URL override (required for Ollama, Liquid local, or custom endpoints).
# Ollama default: "http://localhost:11434/v1"
# Liquid local: "http://localhost:8000/v1"
base_url = ""
temperature = 0.0
max_tokens = 2048

[embedding]
# Provider for vector embeddings.
# Options: "openai", "voyage", "cohere", "ollama", "fastembed"
provider = "openai"
api_key = ""
model = "text-embedding-3-small"
base_url = ""
# Must match the model's output dimensionality.
dimensions = 1536

[extraction]
# Extraction mode:
# "llm"    - Use LLM for entity/relationship extraction (highest quality)
# "rules"  - Rule-based extraction (no LLM dependency, lower quality)
# "hybrid" - Rules first, LLM for refinement (balanced)
mode = "llm"
# Number of episodes to process in parallel.
batch_size = 10
# Retry failed extractions this many times.
max_retries = 3
# Concurrent LLM calls for extraction.
concurrency = 4
# How often to check for pending episodes (milliseconds).
poll_interval_ms = 500
# After how many completed episodes per session to trigger progressive summarization.
# Set to 0 to disable. The summary is stored in session.summary and updated in place.
session_summary_threshold = 10

# Note: Graph features (community detection, summarization) are built into the
# graph engine and always active. There is no separate [graph] config section.

[retrieval]
# Default context assembly strategy.
# Combines results from multiple search types, sorted by relevance.
default_max_tokens = 500
default_min_relevance = 0.3
# Reranking strategy: "rrf" (Reciprocal Rank Fusion), "mmr" (Maximal Marginal Relevance)
reranker = "rrf"
# Enable app-level metadata prefilter planner for memory context.
metadata_prefilter_enabled = true
# Maximum episodes scanned by metadata prefilter planner per request.
metadata_scan_limit = 400
# If filters over-prune to zero candidates, optionally relax to scanned candidates.
metadata_relax_if_empty = false

[webhooks]
enabled = true
max_attempts = 3
base_backoff_ms = 200
request_timeout_ms = 3000
max_events_per_webhook = 1000
rate_limit_per_minute = 120
circuit_breaker_threshold = 5
circuit_breaker_cooldown_ms = 60000
persistence_enabled = true
# Redis key suffix under the main Redis prefix (for example: mnemo:webhooks:* )
persistence_prefix = "webhooks"

# Note: Retention is per-user, managed via the Policy API (PUT /api/v1/policies/:user).
# Default retention is 3650 days (10 years) for all episode types.
# There is no global [retention] config section.

[observability]
# Log level: "trace", "debug", "info", "warn", "error"
log_level = "info"
# Log format: "json" (production) or "pretty" (development)
log_format = "pretty"
# Enable Prometheus metrics endpoint at /metrics.
metrics_enabled = true
# Enable OpenTelemetry OTLP trace/metric export.
otel_enabled = false
# OTLP gRPC endpoint (e.g. "http://localhost:4317").
otel_endpoint = ""
# OpenTelemetry service name.
otel_service_name = "mnemo-server"

[encryption]
# Enable BYOK envelope encryption for data at rest.
enabled = false
# Base64-encoded 256-bit (32-byte) master key.
# Set via MNEMO_ENCRYPTION_MASTER_KEY env var in production.
master_key = ""
# Key identifier for rotation tracking.
key_id = "kek-001"
