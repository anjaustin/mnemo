name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Workspace compile check
        run: cargo check --workspace

      - name: Workspace clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Workspace unit tests
        run: cargo test --workspace --lib --bins

  integration-regression:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis/redis-stack:latest
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Wait for Redis and Qdrant
        run: |
          python3 - <<'PY'
          import socket
          import time

          targets = [
              ("127.0.0.1", 6379, "redis"),
              ("127.0.0.1", 6334, "qdrant-grpc"),
          ]

          deadline = time.time() + 90
          for host, port, name in targets:
              while True:
                  try:
                      with socket.create_connection((host, port), timeout=2):
                          print(f"{name} is up on {host}:{port}")
                          break
                  except OSError:
                      if time.time() > deadline:
                          raise SystemExit(f"Timed out waiting for {name} on {host}:{port}")
                      time.sleep(1)
          PY

      - name: Run storage integration tests
        env:
          MNEMO_TEST_REDIS_URL: redis://localhost:6379
        run: cargo test -p mnemo-storage --test storage -- --test-threads=1

      - name: Run ingest integration tests
        env:
          MNEMO_TEST_REDIS_URL: redis://localhost:6379
        run: cargo test -p mnemo-ingest --test ingest -- --test-threads=1

      - name: Run memory API falsification
        env:
          MNEMO_TEST_REDIS_URL: redis://localhost:6379
          MNEMO_TEST_QDRANT_URL: http://localhost:6334
          MNEMO_TEST_QDRANT_PREFIX: mnemo_
        run: cargo test -p mnemo-server --test memory_api -- --test-threads=1

      - name: Launch Mnemo server for smoke test
        env:
          MNEMO_SERVER_HOST: 127.0.0.1
          MNEMO_SERVER_PORT: 8080
          MNEMO_REDIS_URL: redis://localhost:6379
          MNEMO_QDRANT_URL: http://localhost:6334
          RUST_LOG: info
        run: |
          cargo run -p mnemo-server > /tmp/mnemo-server.log 2>&1 &
          echo $! > /tmp/mnemo-server.pid

      - name: Wait for Mnemo server health
        run: |
          python3 - <<'PY'
          import time
          import urllib.request

          deadline = time.time() + 90
          url = "http://127.0.0.1:8080/health"
          while True:
              try:
                  with urllib.request.urlopen(url, timeout=2) as resp:
                      if resp.status == 200:
                          print("mnemo server healthy")
                          break
              except Exception:
                  pass
              if time.time() > deadline:
                  raise SystemExit("Timed out waiting for mnemo server health")
              time.sleep(1)
          PY

      - name: Run deterministic e2e smoke test
        run: bash tests/e2e_smoke.sh http://127.0.0.1:8080

      - name: Run temporal quality budget gate
        run: |
          python3 - <<'PY'
          import re
          import subprocess

          cmd = [
              "python3",
              "eval/temporal_eval.py",
              "--target",
              "mnemo",
              "--mnemo-base-url",
              "http://127.0.0.1:8080",
          ]
          output = subprocess.check_output(cmd, text=True)
          print(output)

          temporal_line = None
          for line in output.splitlines():
              if line.startswith("| mnemo | temporal |"):
                  temporal_line = line
                  break

          if temporal_line is None:
              raise SystemExit("Could not find temporal profile row in eval output")

          cols = [c.strip() for c in temporal_line.strip().strip("|").split("|")]
          # columns: System, Profile, Accuracy, Stale Fact Rate, Errors, p50 Latency (ms), p95 Latency (ms)
          accuracy = float(cols[2].rstrip("%")) / 100.0
          stale = float(cols[3].rstrip("%")) / 100.0
          p95 = float(cols[6])

          if accuracy < 0.95:
              raise SystemExit(f"Temporal accuracy budget failed: {accuracy:.3f} < 0.95")
          if stale > 0.05:
              raise SystemExit(f"Temporal stale rate budget failed: {stale:.3f} > 0.05")
          if p95 > 300.0:
              raise SystemExit(f"Temporal p95 latency budget failed: {p95:.1f}ms > 300ms")

          print(
              f"Quality budgets passed: accuracy={accuracy:.3f}, stale={stale:.3f}, p95={p95:.1f}ms"
          )
          PY

      - name: Stop Mnemo server
        if: always()
        run: |
          if [ -f /tmp/mnemo-server.pid ]; then
            kill "$(cat /tmp/mnemo-server.pid)" || true
          fi

      - name: Dump Mnemo server log on failure
        if: failure()
        run: |
          if [ -f /tmp/mnemo-server.log ]; then
            cat /tmp/mnemo-server.log
          fi
