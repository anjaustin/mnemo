# Builds and pushes the mnemo-server Docker image to GitHub Container
# Registry (ghcr.io) on pushes to main and version tags.
name: package-ghcr

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: package-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest

    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/mnemo-server
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

  docker-amd64:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository }}/mnemo-server,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=package-ghcr-amd64
          cache-to: type=gha,mode=max,scope=package-ghcr-amd64

      - name: Export amd64 digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload amd64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-arm64:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository }}/mnemo-server,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=package-ghcr-arm64
          cache-to: type=gha,mode=max,scope=package-ghcr-arm64

      - name: Export arm64 digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload arm64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    needs:
      - prepare
      - docker-amd64
      - docker-arm64
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          TAGS: ${{ needs.prepare.outputs.tags }}
        run: |
          refs=""
          for digest in /tmp/digests/*; do
            refs="$refs ghcr.io/${{ github.repository }}/mnemo-server@sha256:$(basename "$digest")"
          done
          for tag in $TAGS; do
            docker buildx imagetools create --tag "$tag" $refs
          done
