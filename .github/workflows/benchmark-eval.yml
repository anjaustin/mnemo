# Runs the LongMemEval benchmark suite to measure retrieval quality
# (precision, recall, MRR) and prevent regressions in context assembly.
name: benchmark-eval

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      benchmark_target:
        description: "Eval target"
        type: choice
        required: true
        default: mnemo
        options:
          - mnemo
          - zep
          - both
      zep_base_url:
        description: "Optional Zep API base URL"
        required: false
        default: "https://api.getzep.com/api/v2"

permissions:
  contents: read
  actions: read

jobs:
  mnemo-eval:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis/redis-stack:latest
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Wait for Redis and Qdrant
        run: |
          python3 - <<'PY'
          import socket
          import time

          targets = [
              ("127.0.0.1", 6379, "redis"),
              ("127.0.0.1", 6334, "qdrant-grpc"),
          ]

          deadline = time.time() + 90
          for host, port, name in targets:
              while True:
                  try:
                      with socket.create_connection((host, port), timeout=2):
                          print(f"{name} is up on {host}:{port}")
                          break
                  except OSError:
                      if time.time() > deadline:
                          raise SystemExit(f"Timed out waiting for {name} on {host}:{port}")
                      time.sleep(1)
          PY

      - name: Build Mnemo server
        run: cargo build --bin mnemo-server

      - name: Run Mnemo benchmark (default)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.benchmark_target == 'mnemo' || github.event.inputs.benchmark_target == 'both'
        env:
          MNEMO_SERVER_HOST: "127.0.0.1"
          MNEMO_SERVER_PORT: "8080"
          MNEMO_REDIS_URL: "redis://localhost:6379"
          MNEMO_QDRANT_URL: "http://localhost:6334"
          MNEMO_QDRANT_PREFIX: "mnemo_"
          MNEMO_EMBEDDING_PROVIDER: "local"
          MNEMO_EMBEDDING_MODEL: "AllMiniLML6V2"
          MNEMO_EMBEDDING_DIMENSIONS: "384"
        run: |
          mkdir -p eval/results
          target/debug/mnemo-server >/tmp/mnemo_eval.log 2>&1 &
          SERVER_PID=$!
          # Wait up to 120s for server to accept connections
          for i in $(seq 1 120); do
            if python3 -c "import socket; s=socket.create_connection(('127.0.0.1',8080),timeout=1)" 2>/dev/null; then
              echo "Server ready after ${i}s"
              break
            fi
            if [ $i -eq 120 ]; then
              echo "Server failed to start within 120s — logs:"
              cat /tmp/mnemo_eval.log
              exit 1
            fi
            sleep 1
          done
          STATUS=0
          python3 eval/temporal_eval.py --target mnemo --mnemo-base-url http://localhost:8080 \
            --output eval/results/temporal_mnemo.json | tee /tmp/mnemo_eval_table.txt
          [ ${PIPESTATUS[0]} -eq 0 ] || STATUS=1
          python3 eval/temporal_eval.py --target mnemo --cases eval/scientific_research_cases_v2.json \
            --mnemo-base-url http://localhost:8080 --verbose \
            --output eval/results/scientific_mnemo.json | tee /tmp/mnemo_eval_scientific_v2_table.txt
          [ ${PIPESTATUS[0]} -eq 0 ] || STATUS=1
          kill $SERVER_PID || true
          wait $SERVER_PID 2>/dev/null || true
          exit $STATUS

      - name: Run LongMemEval benchmark (Mnemo)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.benchmark_target == 'mnemo' || github.event.inputs.benchmark_target == 'both'
        env:
          MNEMO_SERVER_HOST: "127.0.0.1"
          MNEMO_SERVER_PORT: "8080"
          MNEMO_REDIS_URL: "redis://localhost:6379"
          MNEMO_QDRANT_URL: "http://localhost:6334"
          MNEMO_QDRANT_PREFIX: "mnemo_"
          MNEMO_EMBEDDING_PROVIDER: "local"
          MNEMO_EMBEDDING_MODEL: "AllMiniLML6V2"
          MNEMO_EMBEDDING_DIMENSIONS: "384"
        run: |
          mkdir -p eval/results
          target/debug/mnemo-server >/tmp/mnemo_longmem.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 120); do
            if python3 -c "import socket; s=socket.create_connection(('127.0.0.1',8080),timeout=1)" 2>/dev/null; then
              echo "Server ready after ${i}s"
              break
            fi
            if [ $i -eq 120 ]; then
              echo "Server failed to start within 120s — logs:"
              cat /tmp/mnemo_longmem.log
              exit 1
            fi
            sleep 1
          done
          python3 eval/longmem_eval.py --mnemo-base-url http://localhost:8080 --gate-only \
            --output eval/results/longmem_mnemo.json | tee /tmp/longmem_eval_table.txt
          STATUS=$?
          kill $SERVER_PID || true
          wait $SERVER_PID 2>/dev/null || true
          exit $STATUS

      - name: Run Zep benchmark (manual)
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.benchmark_target == 'zep' || github.event.inputs.benchmark_target == 'both')
        env:
          ZEP_API_KEY: ${{ secrets.ZEP_API_KEY }}
          MNEMO_SERVER_HOST: "127.0.0.1"
          MNEMO_SERVER_PORT: "8080"
          MNEMO_REDIS_URL: "redis://localhost:6379"
          MNEMO_QDRANT_URL: "http://localhost:6334"
          MNEMO_QDRANT_PREFIX: "mnemo_"
          MNEMO_EMBEDDING_PROVIDER: "local"
          MNEMO_EMBEDDING_MODEL: "AllMiniLML6V2"
          MNEMO_EMBEDDING_DIMENSIONS: "384"
        run: |
          if [ -z "$ZEP_API_KEY" ]; then
            echo "Missing required secret: ZEP_API_KEY"
            exit 1
          fi

          if [ "${{ github.event.inputs.benchmark_target }}" = "both" ]; then
            target/debug/mnemo-server >/tmp/mnemo_eval.log 2>&1 &
            SERVER_PID=$!
            for i in $(seq 1 120); do
              if python3 -c "import socket; s=socket.create_connection(('127.0.0.1',8080),timeout=1)" 2>/dev/null; then
                echo "Server ready after ${i}s"; break
              fi
              [ $i -eq 120 ] && { cat /tmp/mnemo_eval.log; exit 1; }
              sleep 1
            done
            python3 eval/temporal_eval.py --target both --mnemo-base-url http://localhost:8080 --zep-base-url "${{ github.event.inputs.zep_base_url }}" --zep-api-key "$ZEP_API_KEY" | tee /tmp/zep_eval_table.txt
            STATUS=$?
            kill $SERVER_PID || true
            wait $SERVER_PID 2>/dev/null || true
            exit $STATUS
          else
            python3 eval/temporal_eval.py --target zep --zep-base-url "${{ github.event.inputs.zep_base_url }}" --zep-api-key "$ZEP_API_KEY" | tee /tmp/zep_eval_table.txt
          fi

      # D1: Upload result files as CI artifacts (retained 90 days)
      - name: Upload eval result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: eval/results/*.json
          if-no-files-found: ignore
          retention-days: 90

      # D2: Download baseline from the latest main-branch run and check for regressions.
      # Skipped on the first run (no baseline artifact exists yet).
      - name: Download baseline eval results
        if: always() && github.ref != 'refs/heads/main'
        id: download-baseline
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: benchmark-eval.yml
          branch: main
          name_is_regexp: true
          name: eval-results-.*
          path: /tmp/baseline-results
          if_no_artifact_found: ignore

      - name: Regression detection (compare.py)
        if: always() && steps.download-baseline.outcome == 'success'
        run: |
          # Merge all baseline JSON files into a single dir for comparison
          mkdir -p /tmp/baseline-flat
          find /tmp/baseline-results -name '*.json' -exec cp {} /tmp/baseline-flat/ \;

          REGRESSIONS=0
          for current in eval/results/*.json; do
            pack=$(basename "$current" .json | sed 's/_mnemo$//')
            baseline=$(ls /tmp/baseline-flat/${pack}_mnemo.json 2>/dev/null || true)
            if [ -z "$baseline" ]; then
              echo "No baseline for $pack — skipping regression check"
              continue
            fi
            echo "Comparing $pack: $baseline vs $current"
            python3 eval/compare.py "$baseline" "$current" --fail-on-regression || REGRESSIONS=$((REGRESSIONS+1))
          done

          if [ "$REGRESSIONS" -gt 0 ]; then
            echo "::error::$REGRESSIONS eval pack(s) regressed. See Step Summary for details."
            exit 1
          fi

      - name: Publish benchmark summary
        if: always()
        run: |
          echo "## Benchmark Eval" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/mnemo_eval_table.txt ]; then
            echo "### Mnemo" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/mnemo_eval_table.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f /tmp/mnemo_eval_scientific_v2_table.txt ]; then
            echo "### Mnemo Scientific Pack v2" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/mnemo_eval_scientific_v2_table.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f /tmp/longmem_eval_table.txt ]; then
            echo "### LongMemEval (Mnemo)" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/longmem_eval_table.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f /tmp/zep_eval_table.txt ]; then
            echo "### Zep" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/zep_eval_table.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
