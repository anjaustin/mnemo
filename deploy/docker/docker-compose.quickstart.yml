# ============================================================================
# Mnemo Quickstart Stack — Zero-Config
#
# Gets you from nothing to working memory in 30 seconds.
# Uses local embeddings (AllMiniLML6V2) — no API keys required.
#
# Usage:
#   docker compose -f docker-compose.quickstart.yml up -d
#   curl http://localhost:8080/health
#
# MCP integration (Claude Code, Cursor, etc.):
#   docker exec -i mnemo-server mnemo-mcp-server
#
# Dashboard:
#   http://localhost:8080/_/
#
# To stop:
#   docker compose -f docker-compose.quickstart.yml down
#
# For production use, see docker-compose.prod.yml instead.
# ============================================================================

services:
  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis/redis-stack:7.4.0-v1
    container_name: mnemo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Qdrant ────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: mnemo-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "pidof qdrant || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Mnemo Server ──────────────────────────────────────────────────
  mnemo:
    image: ghcr.io/anjaustin/mnemo/mnemo-server:${MNEMO_VERSION:-latest}
    # Published image is currently amd64-only; Docker Desktop can emulate it on
    # Apple Silicon until a multi-arch image is available.
    platform: linux/amd64
    container_name: mnemo-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Server
      - MNEMO_SERVER_HOST=0.0.0.0
      - MNEMO_SERVER_PORT=8080
      # Storage (docker network hostnames)
      - MNEMO_REDIS_URL=redis://redis:6379
      - MNEMO_QDRANT_URL=http://qdrant:6334
      # Local embeddings — no API key needed
      - MNEMO_EMBEDDING_PROVIDER=local
      - MNEMO_EMBEDDING_MODEL=AllMiniLML6V2
      - MNEMO_EMBEDDING_DIMENSIONS=384
      # No LLM by default — memory works without extraction
      # To enable extraction, add your API key:
      #   MNEMO_LLM_PROVIDER=anthropic
      #   MNEMO_LLM_API_KEY=sk-ant-...
      #   MNEMO_LLM_MODEL=claude-haiku-4-20250514
      - MNEMO_LLM_PROVIDER=none
      # Auth disabled for quickstart
      - MNEMO_AUTH_ENABLED=false
      - RUST_LOG=mnemo=info
      # MCP server config (used by: docker exec -i mnemo-server mnemo-mcp-server)
      - MNEMO_MCP_BASE_URL=http://localhost:8080
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # NOTE: The published runtime image is distroless, so container-side health
    # checks that rely on curl/wget are not available. The quickstart script
    # polls http://localhost:8080/healthz from the host instead.

volumes:
  redis-data:
    driver: local
  qdrant-data:
    driver: local
