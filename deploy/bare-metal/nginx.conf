# ============================================================================
# Mnemo nginx reverse proxy
#
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/mnemo
#   sudo ln -s /etc/nginx/sites-available/mnemo /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then get a TLS certificate:
#   sudo certbot --nginx -d your.domain.example
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name your.domain.example;

    # Increase timeouts for long-running context retrieval requests.
    # Mnemo is pure HTTP/REST — no WebSocket or streaming, so no special
    # upgrade headers are needed.
    proxy_connect_timeout  60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # Buffer settings — Mnemo responses are JSON, typically < 1 MB
    proxy_buffering       on;
    proxy_buffer_size     16k;
    proxy_buffers         8 16k;

    # Security headers
    add_header X-Content-Type-Options  nosniff always;
    add_header X-Frame-Options         DENY    always;
    add_header X-XSS-Protection        "1; mode=block" always;

    # Body size — set generously for bulk memory ingest operations
    client_max_body_size 16m;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass through the Mnemo request ID for tracing
        proxy_pass_header  X-Mnemo-Request-Id;
    }

    # Health check endpoint — exclude from access logs to reduce noise
    location = /health {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        access_log         off;
    }
}

# TLS config is added automatically by certbot --nginx.
# The block above will be updated in place; do not remove it.
