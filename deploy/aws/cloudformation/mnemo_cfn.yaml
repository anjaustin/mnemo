AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Mnemo Memory Server — single EC2 instance running the full three-service
  stack (mnemo-server + Redis + Qdrant) via Docker Compose. Persistent data
  is stored on a separate EBS gp3 volume mounted at /data.

# ============================================================================
# Parameters
# ============================================================================
Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - m6i.large
      - m6i.xlarge
    Description: >
      EC2 instance type. t3.medium (2 vCPU / 4 GB RAM) is the recommended
      minimum for production. t3.small (2 GB RAM) is suitable for dev/demo only.

  DataVolumeSize:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 500
    Description: Size in GiB for the persistent EBS data volume (Redis + Qdrant).

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair for SSH access.

  SSHCidr:
    Type: String
    Default: "0.0.0.0/0"
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    Description: >
      CIDR block allowed to SSH into the instance. Restrict to your IP
      (e.g. 203.0.113.42/32) before deploying to production.

  MnemoVersion:
    Type: String
    Default: latest
    Description: >
      mnemo-server Docker image tag to pull from GHCR.
      Currently only "latest" is published. Versioned tags (e.g. "0.3.1")
      will be available once the GHCR publish workflow is updated to tag by version.

  MnemoImage:
    Type: String
    Default: ttl.sh/mnemo-local-embed-distroless-fixed-20260307:24h
    Description: Full Mnemo server image reference.

  MnemoLlmProvider:
    Type: String
    Default: ""
    Description: "LLM provider: openai | anthropic | ollama | liquid (leave blank to skip enrichment)"

  MnemoLlmApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: API key for the LLM provider (stored only in instance UserData; not logged by CloudFormation).

  MnemoLlmModel:
    Type: String
    Default: "gpt-4o-mini"
    Description: LLM model name.

  MnemoEmbeddingApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: API key for the embedding model (may be same as LLM key for OpenAI).

  MnemoEmbeddingModel:
    Type: String
    Default: "text-embedding-3-small"
    Description: Embedding model name.

  MnemoEmbeddingProvider:
    Type: String
    Default: "local"
    Description: Embedding provider (openai | local).

  MnemoEmbeddingDimensions:
    Type: String
    Default: "384"
    Description: Embedding vector dimensions.

  MnemoQdrantPrefix:
    Type: String
    Default: "mnemo_aws_384_"
    Description: Qdrant collection prefix.

  MnemoSessionSummaryThreshold:
    Type: String
    Default: "10"
    Description: Episode threshold for progressive summarization.

  MnemoAuthEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable API key authentication. Set to true before public exposure.

  MnemoAuthApiKeys:
    Type: String
    Default: ""
    NoEcho: true
    Description: Comma-separated API keys (required when MnemoAuthEnabled=true).

# ============================================================================
# Mappings — latest Amazon Linux 2023 AMI per region
# Update periodically; these are current as of 2026-Q1.
# ============================================================================
Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0c101f26f147fa7fd
    us-east-2:
      AMI: ami-0b2f7e6e1b6a5b9b1
    us-west-1:
      AMI: ami-0ce2a7a8e9e7b7c7d
    us-west-2:
      AMI: ami-0c55b159cbfafe1f0
    eu-west-1:
      AMI: ami-0d71ea30463e0ff49
    eu-west-2:
      AMI: ami-0c67c8a2e8e6f8a2e
    eu-central-1:
      AMI: ami-0a261c0e5f51090b1
    ap-southeast-1:
      AMI: ami-0cff7528ff583bf9a
    ap-southeast-2:
      AMI: ami-0c6120f461d6b39e9
    ap-northeast-1:
      AMI: ami-0c3fd0f5d33134a76
    ca-central-1:
      AMI: ami-0c3d3a230b9668c02
    sa-east-1:
      AMI: ami-0c6b1d09930fac512

# ============================================================================
# Resources
# ============================================================================
Resources:

  # ── Security Group ─────────────────────────────────────────────────
  MnemoSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Mnemo server - HTTP and SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: "0.0.0.0/0"
          Description: Mnemo REST API
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: HTTPS (nginx, if configured)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: HTTP (nginx redirect, if configured)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHCidr
          Description: SSH access
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  # ── EC2 Instance ───────────────────────────────────────────────────
  MnemoInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionAMI, !Ref "AWS::Region", AMI]
      KeyName: !Ref KeyName
      SecurityGroups:
        - !Ref MnemoSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
        # Data volume for Redis + Qdrant — attached at boot, no race condition.
        # NOTE: This volume IS deleted when the instance is terminated.
        # Take a snapshot before termination if you need to preserve data.
        - DeviceName: /dev/xvdf
          Ebs:
            VolumeSize: !Ref DataVolumeSize
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: false
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-server"
      UserData:
        Fn::Base64:
          !Sub
            - |
              #!/bin/bash
              exec > /var/log/mnemo-init.log 2>&1
              set -eux

              # Always signal CFN on exit (success or failure)
              signal_cfn() { /opt/aws/bin/cfn-signal -e $1 --stack ${CfnStackName} --region ${CfnRegion} --resource MnemoInstance || true; }
              trap 'signal_cfn $?' EXIT

              # ── Wait for EBS data volume ──────────────────────────────
              for i in $(seq 1 30); do [ -e /dev/xvdf ] && break; sleep 2; done

              # Format if new
              if ! blkid /dev/xvdf; then mkfs.ext4 /dev/xvdf; fi
              mkdir -p /data
              mount /dev/xvdf /data
              grep -q /dev/xvdf /etc/fstab || echo "/dev/xvdf /data ext4 defaults,nofail 0 2" >> /etc/fstab

              # ── Docker ───────────────────────────────────────────────
              # curl-minimal is pre-installed on AL2023; installing curl conflicts with it.
              # docker is the only package we need to add.
              dnf install -y docker --setopt=install_weak_deps=False
              systemctl enable --now docker

              # ── Docker Compose plugin ─────────────────────────────────
              mkdir -p /usr/local/lib/docker/cli-plugins
              curl -fsSL "https://github.com/docker/compose/releases/download/v2.24.6/docker-compose-linux-x86_64" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

              # ── App directories ───────────────────────────────────────
              mkdir -p /data/redis /data/qdrant /opt/mnemo

              # ── Environment file ──────────────────────────────────────
              cat > /opt/mnemo/.env <<'EOF'
              MNEMO_VERSION=__MNEMO_VERSION__
              MNEMO_IMAGE=__MNEMO_IMAGE__
              MNEMO_SERVER_PORT=8080
              MNEMO_LLM_PROVIDER=__LLM_PROVIDER__
              MNEMO_LLM_API_KEY=__LLM_API_KEY__
              MNEMO_LLM_MODEL=__LLM_MODEL__
              MNEMO_EMBEDDING_PROVIDER=__EMBED_PROVIDER__
              MNEMO_EMBEDDING_API_KEY=__EMBED_API_KEY__
              MNEMO_EMBEDDING_MODEL=__EMBED_MODEL__
              MNEMO_EMBEDDING_DIMENSIONS=__EMBED_DIMS__
              MNEMO_QDRANT_PREFIX=__QDRANT_PREFIX__
              MNEMO_SESSION_SUMMARY_THRESHOLD=__SESSION_SUMMARY_THRESHOLD__
              MNEMO_AUTH_ENABLED=__AUTH_ENABLED__
              MNEMO_AUTH_API_KEYS=__AUTH_API_KEYS__
              MNEMO_WEBHOOKS_ENABLED=true
              MNEMO_WEBHOOKS_MAX_ATTEMPTS=3
              RUST_LOG=mnemo=info
              EOF

              # Substitute placeholder values with CFN param values
              sed -i \
                -e "s|__MNEMO_VERSION__|${CfnMnemoVersion}|g" \
                -e "s|__MNEMO_IMAGE__|${CfnMnemoImage}|g" \
                -e "s|__LLM_PROVIDER__|${CfnLlmProvider}|g" \
                -e "s|__LLM_API_KEY__|${CfnLlmApiKey}|g" \
                -e "s|__LLM_MODEL__|${CfnLlmModel}|g" \
                -e "s|__EMBED_PROVIDER__|${CfnEmbeddingProvider}|g" \
                -e "s|__EMBED_API_KEY__|${CfnEmbeddingApiKey}|g" \
                -e "s|__EMBED_MODEL__|${CfnEmbeddingModel}|g" \
                -e "s|__EMBED_DIMS__|${CfnEmbeddingDimensions}|g" \
                -e "s|__QDRANT_PREFIX__|${CfnQdrantPrefix}|g" \
                -e "s|__SESSION_SUMMARY_THRESHOLD__|${CfnSessionSummaryThreshold}|g" \
                -e "s|__AUTH_ENABLED__|${CfnAuthEnabled}|g" \
                -e "s|__AUTH_API_KEYS__|${CfnAuthApiKeys}|g" \
                /opt/mnemo/.env
              chmod 600 /opt/mnemo/.env

              # ── Docker Compose file ───────────────────────────────────
              MNEMO_IMAGE=$(grep '^MNEMO_IMAGE=' /opt/mnemo/.env | cut -d= -f2-)
              cat > /opt/mnemo/docker-compose.yml <<'EOF'
              services:
                redis:
                  image: redis/redis-stack:7.4.0-v1
                  container_name: mnemo-redis
                  restart: always
                  ports:
                    - "127.0.0.1:6379:6379"
                  volumes:
                    - /data/redis:/data
                  environment:
                    - REDIS_ARGS=--save 60 1 --appendonly yes --loglevel warning
                  healthcheck:
                    test: ["CMD", "redis-cli", "ping"]
                    interval: 10s
                    timeout: 5s
                    retries: 5
                    start_period: 10s
                qdrant:
                  image: qdrant/qdrant:v1.12.4
                  container_name: mnemo-qdrant
                  restart: always
                  ports:
                    - "127.0.0.1:6334:6334"
                  volumes:
                    - /data/qdrant:/qdrant/storage
                  environment:
                    - QDRANT__SERVICE__GRPC_PORT=6334
                    - QDRANT__LOG_LEVEL=WARN
                  healthcheck:
                    test: ["CMD-SHELL", "pidof qdrant || exit 1"]
                    interval: 10s
                    timeout: 5s
                    retries: 5
                    start_period: 15s
                mnemo:
                  image: __MNEMO_IMAGE__
                  container_name: mnemo-server
                  restart: always
                  ports:
                    - "8080:8080"
                  env_file:
                    - /opt/mnemo/.env
                  environment:
                    - MNEMO_SERVER_HOST=0.0.0.0
                    - MNEMO_SERVER_PORT=8080
                    - MNEMO_REDIS_URL=redis://redis:6379
                    - MNEMO_QDRANT_URL=http://qdrant:6334
                  depends_on:
                    redis:
                      condition: service_healthy
                    qdrant:
                      condition: service_healthy
                  healthcheck:
                    test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
                    interval: 15s
                    timeout: 5s
                    retries: 3
                    start_period: 20s
              EOF
              sed -i "s|__MNEMO_IMAGE__|$MNEMO_IMAGE|g" /opt/mnemo/docker-compose.yml

              # ── Start the stack ───────────────────────────────────────
              cd /opt/mnemo
              docker compose up -d

              echo "Init complete."
            - CfnMnemoVersion:  !Ref MnemoVersion
              CfnMnemoImage:    !Ref MnemoImage
              CfnLlmProvider:   !Ref MnemoLlmProvider
              CfnLlmApiKey:     !Ref MnemoLlmApiKey
              CfnLlmModel:      !Ref MnemoLlmModel
              CfnEmbeddingProvider: !Ref MnemoEmbeddingProvider
              CfnEmbeddingApiKey: !Ref MnemoEmbeddingApiKey
              CfnEmbeddingModel:  !Ref MnemoEmbeddingModel
              CfnEmbeddingDimensions: !Ref MnemoEmbeddingDimensions
              CfnQdrantPrefix: !Ref MnemoQdrantPrefix
              CfnSessionSummaryThreshold: !Ref MnemoSessionSummaryThreshold
              CfnAuthEnabled:   !Ref MnemoAuthEnabled
              CfnAuthApiKeys:   !Ref MnemoAuthApiKeys
              CfnStackName:     !Ref "AWS::StackName"
              CfnRegion:        !Ref "AWS::Region"

    CreationPolicy:
      ResourceSignal:
        Timeout: PT20M

# ============================================================================
# Outputs
# ============================================================================
Outputs:
  InstancePublicIP:
    Description: Public IP address of the Mnemo instance
    Value: !GetAtt MnemoInstance.PublicIp

  HealthCheckURL:
    Description: Mnemo health check endpoint
    Value: !Sub "http://${MnemoInstance.PublicIp}:8080/health"

  MemoryWriteExample:
    Description: Example curl command to write a memory
    Value: !Sub |
      curl -s -X POST http://${MnemoInstance.PublicIp}:8080/api/v1/memory \
        -H "Content-Type: application/json" \
        -d '{"user":"alice","session":"test","text":"Mnemo on AWS"}'

  SSHCommand:
    Description: SSH command to access the instance
    Value: !Sub "ssh -i <your-key>.pem ec2-user@${MnemoInstance.PublicIp}"

  InitLog:
    Description: Path to UserData init log on the instance
    Value: /var/log/mnemo-init.log

  DataNote:
    Description: Data volume note
    Value: "Data volume (Redis + Qdrant) is attached as /dev/xvdf with DeleteOnTermination=false. Snapshot before terminating the instance to preserve data."
