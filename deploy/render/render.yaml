services:
  # ── Mnemo API server (public) ───────────────────────────────────────────────
  - type: web
    name: mnemo
    runtime: image
    image:
      url: ghcr.io/anjaustin/mnemo/mnemo-server:latest
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: MNEMO_SERVER_HOST
        value: 0.0.0.0
      - key: MNEMO_SERVER_PORT
        value: "8080"
      - key: MNEMO_REDIS_URL
        fromService:
          name: mnemo-redis
          type: pserv
          envVarKey: REDIS_URL
      - key: MNEMO_QDRANT_URL
        fromService:
          name: mnemo-qdrant
          type: pserv
          envVarKey: QDRANT_URL
      - key: MNEMO_LLM_PROVIDER
        value: openai
      - key: MNEMO_LLM_API_KEY
        sync: false
      - key: MNEMO_LLM_MODEL
        value: gpt-4o-mini
      - key: MNEMO_EMBEDDING_API_KEY
        sync: false
      - key: MNEMO_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: MNEMO_AUTH_ENABLED
        value: "false"
      - key: MNEMO_AUTH_API_KEYS
        sync: false
      - key: MNEMO_WEBHOOKS_ENABLED
        value: "true"
      - key: MNEMO_WEBHOOKS_MAX_ATTEMPTS
        value: "3"
      - key: RUST_LOG
        value: mnemo=info
    autoDeploy: false

  # ── Redis Stack (private — not internet-reachable) ──────────────────────────
  # Render's managed "Key Value" is plain Redis without Stack modules
  # (RedisSearch, RedisJSON). Mnemo requires Stack, so we run it as a
  # private Docker service instead.
  - type: pserv
    name: mnemo-redis
    runtime: image
    image:
      url: redis/redis-stack-server:7.4.0-v1
    plan: starter
    region: oregon
    disk:
      name: redis-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: REDIS_ARGS
        value: "--save 60 1 --appendonly yes --loglevel warning"
      - key: REDIS_URL
        value: "redis://mnemo-redis:6379"
    autoDeploy: false

  # ── Qdrant (private — not internet-reachable) ──────────────────────────────
  - type: pserv
    name: mnemo-qdrant
    runtime: image
    image:
      url: qdrant/qdrant:v1.12.4
    plan: starter
    region: oregon
    disk:
      name: qdrant-storage
      mountPath: /qdrant/storage
      sizeGB: 10
    envVars:
      - key: QDRANT__SERVICE__GRPC_PORT
        value: "6334"
      - key: QDRANT__LOG_LEVEL
        value: WARN
      - key: QDRANT_URL
        value: "http://mnemo-qdrant:6334"
    autoDeploy: false
