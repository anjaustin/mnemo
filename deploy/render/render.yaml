services:
  - type: web
    name: mnemo
    runtime: image
    image:
      url: ghcr.io/anjaustin/mnemo/mnemo-server:latest
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: MNEMO_SERVER_HOST
        value: 0.0.0.0
      - key: MNEMO_SERVER_PORT
        value: "8080"
      - key: MNEMO_REDIS_URL
        fromService:
          name: mnemo-redis
          type: redis
          property: connectionString
      - key: MNEMO_QDRANT_URL
        value: http://mnemo-qdrant:6334
      - key: MNEMO_LLM_PROVIDER
        value: openai
      - key: MNEMO_LLM_API_KEY
        sync: false
      - key: MNEMO_LLM_MODEL
        value: gpt-4o-mini
      - key: MNEMO_EMBEDDING_API_KEY
        sync: false
      - key: MNEMO_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: MNEMO_AUTH_ENABLED
        value: "false"
      - key: MNEMO_AUTH_API_KEYS
        sync: false
      - key: MNEMO_WEBHOOKS_ENABLED
        value: "true"
      - key: MNEMO_WEBHOOKS_MAX_ATTEMPTS
        value: "3"
      - key: RUST_LOG
        value: mnemo=info
    autoDeploy: false

  - type: redis
    name: mnemo-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: mnemo-qdrant
    runtime: image
    image:
      url: qdrant/qdrant:v1.12.4
    plan: starter
    region: oregon
    disk:
      name: qdrant-storage
      mountPath: /qdrant/storage
      sizeGB: 20
    envVars:
      - key: QDRANT__SERVICE__GRPC_PORT
        value: "6334"
      - key: QDRANT__LOG_LEVEL
        value: WARN
    autoDeploy: false
