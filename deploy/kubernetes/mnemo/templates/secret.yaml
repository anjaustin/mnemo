{{- if and .Values.mnemo.bootstrapKeys (not .Values.mnemo.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mnemo.fullname" . }}-auth
  labels:
    {{- include "mnemo.labels" . | nindent 4 }}
type: Opaque
stringData:
  MNEMO_AUTH_BOOTSTRAP_KEYS: {{ .Values.mnemo.bootstrapKeys | quote }}
{{- end }}
