apiVersion: v2
name: mnemo
description: Memory infrastructure for production AI agents — temporal knowledge graph, hybrid retrieval, enterprise access control.
type: application
version: 0.7.0
appVersion: "0.7.0"
home: https://github.com/anjaustin/mnemo
sources:
  - https://github.com/anjaustin/mnemo
maintainers:
  - name: Mnemo
    url: https://github.com/anjaustin/mnemo
keywords:
  - ai
  - memory
  - knowledge-graph
  - retrieval
  - grpc
  - agents
dependencies:
  - name: redis
    version: "~20.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: qdrant
    version: "~1.x"
    repository: https://qdrant.github.io/qdrant-helm
    condition: qdrant.enabled
