# ============================================================================
# Mnemo Helm Chart — Default Values
# ============================================================================

# -- Number of Mnemo server replicas
replicaCount: 2

image:
  # -- Container image repository
  repository: ghcr.io/anjaustin/mnemo/mnemo-server
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to Chart appVersion)
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Service account configuration
serviceAccount:
  create: true
  # -- Mnemo does not use the Kubernetes API; disable token automounting.
  automount: false
  annotations: {}
  name: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod labels
podLabels: {}

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

# -- Service configuration
service:
  type: ClusterIP
  # -- REST + gRPC port (both served on same port)
  port: 8080
  annotations: {}

# -- Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: mnemo.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: mnemo-tls
  #    hosts:
  #      - mnemo.example.com

# -- Resource limits and requests
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

# -- Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# -- Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- Liveness probe
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

# -- Readiness probe
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Startup probe (allows slow initial model download)
startupProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules (anti-affinity for HA by default)
affinity: {}

# -- Topology spread constraints for HA
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels: {}  # populated by template

# -- NetworkPolicy configuration (requires a CNI that supports NetworkPolicy)
networkPolicy:
  # -- Enable NetworkPolicy to restrict pod-to-pod traffic
  enabled: false

# ============================================================================
# Mnemo Configuration
# ============================================================================

mnemo:
  # -- Server bind host
  host: "0.0.0.0"
  # -- Server bind port
  port: 8080

  # -- Enable API key authentication
  authEnabled: true

  # -- Bootstrap API keys (comma-separated). Use existingSecret for production.
  bootstrapKeys: ""

  # -- Name of existing Secret containing MNEMO_AUTH_BOOTSTRAP_KEYS
  existingSecret: ""

  # -- LLM provider: openai, anthropic, ollama, liquid
  llmProvider: "anthropic"
  # -- LLM model for extraction/summarization
  llmModel: "claude-haiku-4-20250514"

  # -- Embedding provider: openai, local, ollama
  embeddingProvider: "local"
  # -- Embedding model name
  embeddingModel: "AllMiniLML6V2"
  # -- Embedding vector dimensions
  embeddingDimensions: 384

  # -- Redis connection URL (overridden if redis.enabled=true)
  redisUrl: ""
  # -- Qdrant connection URL (overridden if qdrant.enabled=true)
  qdrantUrl: ""
  # -- Qdrant collection prefix (must include trailing underscore)
  qdrantPrefix: "mnemo_"

  # -- Enable BYOK envelope encryption for data at rest
  encryptionEnabled: false
  # -- Encryption key ID for rotation tracking
  encryptionKeyId: "kek-001"
  # -- Base64-encoded 256-bit master key. Set via --set or existingSecret in production.
  # WARNING: Do NOT commit secrets to values files. Use --set-file or existingSecret.
  encryptionMasterKey: ""

  # -- Enable OpenTelemetry OTLP trace export
  otelEnabled: false
  # -- OTLP gRPC endpoint (e.g. "http://otel-collector:4317")
  otelEndpoint: ""
  # -- OpenTelemetry service name
  otelServiceName: "mnemo-server"

  # -- Additional environment variables
  extraEnv: []
  # - name: ANTHROPIC_API_KEY
  #   valueFrom:
  #     secretKeyRef:
  #       name: mnemo-llm-keys
  #       key: anthropic-api-key

  # -- Extra volumes to mount (e.g., for fastembed model cache)
  extraVolumes: []
  extraVolumeMounts: []

# ============================================================================
# Redis Subchart (Bitnami)
# ============================================================================

redis:
  # -- Deploy Redis as a subchart
  enabled: true
  architecture: standalone
  auth:
    # -- Enable Redis authentication. Set redis.auth.password via --set or existingSecret.
    enabled: true
    # -- Redis password (set via --set-file or existingSecret in production)
    password: ""
    # -- Use an existing Secret for Redis password (key: redis-password)
    existingSecret: ""
  master:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ============================================================================
# Qdrant Subchart
# ============================================================================

qdrant:
  # -- Deploy Qdrant as a subchart
  enabled: true
  replicaCount: 1
  # -- Qdrant API key for authenticated access. Set to true (auto-generate),
  # a string (fixed key), or false (disabled, default).
  # apiKey: false
  # readOnlyApiKey: false
  # -- Container security context (adds seccompProfile to subchart defaults)
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 2000
    allowPrivilegeEscalation: false
    privileged: false
    readOnlyRootFilesystem: true
    seccompProfile:
      type: RuntimeDefault
  # -- Pod security context
  podSecurityContext:
    fsGroup: 3000
    fsGroupChangePolicy: Always
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
