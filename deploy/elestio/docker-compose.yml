services:
  redis:
    image: redis/redis-stack:7.4.0-v1
    container_name: mnemo-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --appendonly yes --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: mnemo-qdrant
    restart: always
    ports:
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=WARN
    healthcheck:
      test: ["CMD-SHELL", "pidof qdrant || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mnemo:
    image: ghcr.io/anjaustin/mnemo/mnemo-server:latest
    container_name: mnemo-server
    restart: always
    ports:
      - "0.0.0.0:9000:8080"  # Elestio maps external port — adjust as needed
    env_file:
      - .env
    environment:
      - MNEMO_SERVER_HOST=0.0.0.0
      - MNEMO_SERVER_PORT=8080
      - MNEMO_REDIS_URL=redis://redis:6379
      - MNEMO_QDRANT_URL=http://qdrant:6334
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  redis_data:
  qdrant_data:
