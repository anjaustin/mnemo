# ============================================================================
# Mnemo Local Development Stack
# Memory that evolves. Context that matters.
# ============================================================================

services:
  # ── Redis ─────────────────────────────────────────────────────────
  # Used for: user/session/episode state, graph adjacency lists, caching
  redis:
    image: redis/redis-stack:7.4.0-v1
    container_name: mnemo-redis
    ports:
      - "6379:6379"      # Redis protocol
      - "8001:8001"      # RedisInsight (web UI)
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Qdrant ────────────────────────────────────────────────────────
  # Used for: vector embeddings, semantic search, hybrid retrieval
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: mnemo-qdrant
    ports:
      - "6333:6333"      # REST API
      - "6334:6334"      # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "pidof qdrant || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Mnemo Server ──────────────────────────────────────────────────
  # The main application server
  mnemo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mnemo-server
    ports:
      - "8080:8080"      # REST API
      - "50051:50051"    # gRPC (future)
    environment:
      - MNEMO_CONFIG=/app/config/default.toml
      - MNEMO_SERVER_HOST=0.0.0.0
      - MNEMO_SERVER_PORT=8080
      - MNEMO_REDIS_URL=redis://redis:6379
      - MNEMO_QDRANT_URL=http://qdrant:6334
      - MNEMO_LLM_API_KEY=${MNEMO_LLM_API_KEY:-}
      - MNEMO_EMBEDDING_API_KEY=${MNEMO_EMBEDDING_API_KEY:-}
      - RUST_LOG=mnemo=debug,tower_http=debug
    volumes:
      - ./config:/app/config:ro
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  qdrant-data:
    driver: local
