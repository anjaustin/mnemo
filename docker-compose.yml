# ============================================================================
# Mnemo — one-line production stack
# docker compose up -d
#
# Required env vars (set in .env or shell):
#   MNEMO_LLM_API_KEY      — Anthropic or OpenAI key
#   MNEMO_LLM_PROVIDER     — "anthropic" (default) or "openai"
#   MNEMO_LLM_MODEL        — e.g. "claude-haiku-4-20250514"
#
# Optional:
#   MNEMO_API_KEY          — bearer token for API auth (leave blank = open)
#   MNEMO_PORT             — host port (default 8080)
# ============================================================================

services:
  # ── Redis (with RediSearch / RedisStack) ──────────────────────────
  redis:
    image: redis/redis-stack:7.4.0-v1
    container_name: mnemo-redis
    ports:
      - "6379:6379"
      - "8001:8001"      # RedisInsight UI (optional)
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Qdrant ────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: mnemo-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=WARN
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "pidof qdrant || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Mnemo Server ──────────────────────────────────────────────────
  # Uses the pre-built GHCR image (no local Rust toolchain needed).
  # To build from source instead: comment out `image:` and uncomment `build:`.
  mnemo:
    image: ghcr.io/anjaustin/mnemo/mnemo-server:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: mnemo-server
    ports:
      - "${MNEMO_PORT:-8080}:8080"
    environment:
      - MNEMO_SERVER_HOST=0.0.0.0
      - MNEMO_SERVER_PORT=8080
      - MNEMO_REDIS_URL=redis://redis:6379
      - MNEMO_QDRANT_URL=http://qdrant:6334
      # LLM — set MNEMO_LLM_API_KEY in your shell or .env file
      - MNEMO_LLM_PROVIDER=${MNEMO_LLM_PROVIDER:-anthropic}
      - MNEMO_LLM_MODEL=${MNEMO_LLM_MODEL:-claude-haiku-4-20250514}
      - MNEMO_LLM_API_KEY=${MNEMO_LLM_API_KEY:-}
      # Embeddings — local fastembed (no key needed) or openai-compat
      - MNEMO_EMBEDDING_PROVIDER=${MNEMO_EMBEDDING_PROVIDER:-local}
      - MNEMO_EMBEDDING_MODEL=${MNEMO_EMBEDDING_MODEL:-AllMiniLML6V2}
      - MNEMO_EMBEDDING_DIMENSIONS=${MNEMO_EMBEDDING_DIMENSIONS:-384}
      # Auth (optional)
      - MNEMO_AUTH_ENABLED=${MNEMO_AUTH_ENABLED:-false}
      - MNEMO_AUTH_API_KEYS=${MNEMO_API_KEY:-}
      - RUST_LOG=${RUST_LOG:-mnemo=info,tower_http=warn}
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # NOTE: The GHCR image uses distroless (no shell/curl). Health checking
    # is done externally by the quickstart script or your orchestrator.
    # If building from source with a Debian-based image, uncomment:
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  qdrant-data:
    driver: local
